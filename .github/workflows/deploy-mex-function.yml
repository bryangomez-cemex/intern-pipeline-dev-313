name: Deploy Azure Function - mex-intern-pipeline-func-win

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: mex-intern-pipeline-func-win
  PACKAGE_PATH: azure_function_app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Prepare function package
        run: |
          mkdir -p azure_function_app/scripts
          rsync -av scripts/ azure_function_app/scripts/
          if [ -f requirements.txt ]; then cp requirements.txt azure_function_app/requirements.txt; fi

          find azure_function_app -type d -name "__pycache__" -prune -exec rm -rf {} +
          find azure_function_app -type f -name "*.pyc" -delete
          rm -rf azure_function_app/.venv azure_function_app/data

          test -f azure_function_app/function_app.py
          test -f azure_function_app/host.json
          test -f azure_function_app/requirements.txt

          # Build dependencies INSIDE the official Azure Functions Python base image
          # so native wheels (cryptography, pyodbc, pandas) match the runtime host's
          # glibc. Building on the Ubuntu runner produced a cryptography wheel that
          # required GLIBC_2.33, which the Functions host lacks, breaking azure-identity.
          docker run --rm -v "$PWD/azure_function_app":/pkg -w /pkg \
            mcr.microsoft.com/azure-functions/python:4-python3.11 \
            bash -c "python -m pip install --upgrade pip && python -m pip install -r requirements.txt --target .python_packages/lib/site-packages"

      - name: Zip function package
        run: |
          cd azure_function_app
          zip -r ../function-package.zip .

      - name: Extract Kudu credentials
        id: kudu
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_WIN }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import xml.etree.ElementTree as ET
          from urllib.parse import urlparse

          xml = os.environ["PUBLISH_PROFILE"]
          root = ET.fromstring(xml)

          selected = None
          for p in root.findall(".//publishProfile"):
              url = p.attrib.get("publishUrl", "")
              if ".scm." in url:
                  selected = p
                  break

          if selected is None:
              raise SystemExit("No SCM/Kudu publish profile found")

          raw_url = selected.attrib["publishUrl"]
          username = selected.attrib["userName"]
          password = selected.attrib["userPWD"]

          if not raw_url.startswith("http"):
              raw_url = "https://" + raw_url

          parsed = urlparse(raw_url)
          host = parsed.netloc or parsed.path.split("/")[0]
          host = host.replace(":443", "")

          print(f"url=https://{host}/api/zipdeploy")
          print(f"username={username}")
          print(f"password={password}")
          PY

      - name: Deploy package to Kudu zipdeploy
        env:
          KUDU_URL: ${{ steps.kudu.outputs.url }}
          KUDU_USER: ${{ steps.kudu.outputs.username }}
          KUDU_PASS: ${{ steps.kudu.outputs.password }}
        run: |
          echo "::add-mask::$KUDU_USER"
          echo "::add-mask::$KUDU_PASS"
          echo "Deploying to $KUDU_URL"

          http_code=$(curl -X POST "${KUDU_URL}?isAsync=true" \
            -u "$KUDU_USER:$KUDU_PASS" \
            --data-binary @"function-package.zip" \
            -H "Content-Type: application/zip" \
            --silent \
            --show-error \
            --output kudu-response.txt \
            --write-out "%{http_code}")

          echo "Kudu HTTP status: $http_code"
          echo "Kudu response:"
          cat kudu-response.txt || true

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            exit 1
          fi

      - name: Deployment done
        run: echo "Deployed to mex-intern-pipeline-func-win"
