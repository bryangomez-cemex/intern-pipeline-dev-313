name: Deploy Azure Function - mex-intern-pipeline-func-win

# This app is hosted on the Azure Functions **Flex Consumption** plan
# (Linux, Python 3.11). Flex Consumption does NOT use the classic Kudu
# /api/zipdeploy endpoint — it deploys via OneDeploy with a server-side
# (Oryx) build from requirements.txt. The official Azure/functions-action
# handles this when `remote-build: true` is set.
#
# Manual deploy (known-good, used for the production-readiness rollout):
#   az functionapp deployment source config-zip \
#     -g rg-intern-pipeline-dev -n mex-intern-pipeline-func-win \
#     --src package.zip --build-remote true
#
# Auth: AZURE_FUNCTIONAPP_PUBLISH_PROFILE_WIN must hold the CURRENT publish
# profile for this app. Refresh it after any credential rotation with:
#   az functionapp deployment list-publishing-profiles \
#     -g rg-intern-pipeline-dev -n mex-intern-pipeline-func-win --xml \
#     | gh secret set AZURE_FUNCTIONAPP_PUBLISH_PROFILE_WIN

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: mex-intern-pipeline-func-win
  PACKAGE_PATH: azure_function_app
  PYTHON_VERSION: '3.11'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Prepare function package (source only — deps build server-side)
        run: |
          mkdir -p azure_function_app/scripts
          rsync -av scripts/ azure_function_app/scripts/
          if [ -f requirements.txt ]; then cp requirements.txt azure_function_app/requirements.txt; fi

          # Ship source only: Flex remote build (Oryx) compiles native wheels
          # (pyodbc, cryptography) against the host's glibc, so we must NOT
          # bundle a locally built .python_packages.
          find azure_function_app -type d -name "__pycache__" -prune -exec rm -rf {} +
          find azure_function_app -type f -name "*.pyc" -delete
          rm -rf azure_function_app/.venv azure_function_app/data azure_function_app/.python_packages

          test -f azure_function_app/function_app.py
          test -f azure_function_app/host.json
          test -f azure_function_app/requirements.txt

      - name: Deploy to Azure Functions (Flex Consumption, remote build)
        uses: Azure/functions-action@v2
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_WIN }}
          remote-build: true

      - name: Deployment done
        run: echo "Deployed to ${{ env.AZURE_FUNCTIONAPP_NAME }}"
