name: Deploy Azure Function - mex-intern-pipeline-func-dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: mex-intern-pipeline-func-dev
  PYTHON_VERSION: "3.11"
  PACKAGE_PATH: azure_function_app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Copy shared scripts into function package
        run: |
          mkdir -p azure_function_app/scripts
          rsync -av scripts/ azure_function_app/scripts/
          if [ -f requirements.txt ]; then cp requirements.txt azure_function_app/requirements.txt; fi

      - name: Clean package
        run: |
          find azure_function_app -type d -name "__pycache__" -prune -exec rm -rf {} +
          find azure_function_app -type f -name "*.pyc" -delete
          rm -rf azure_function_app/.venv azure_function_app/data

      - name: Show package root
        run: |
          ls -la azure_function_app
          test -f azure_function_app/function_app.py
          test -f azure_function_app/host.json
          test -f azure_function_app/requirements.txt

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_MEX }}