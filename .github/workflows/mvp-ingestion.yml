name: MVP Blob Ingestion

on:
  workflow_dispatch:
    inputs:
      prefix:
        description: "Blob prefix to process"
        required: false
        default: ""

# Never run two ingestion jobs at once. If a scheduled run is still in flight
# when the next one fires, the new run waits instead of racing it for the same
# blobs (which caused BlobNotFound failures when two runs archived/deleted the
# same file). cancel-in-progress is false so an in-flight run finishes cleanly.
concurrency:
  group: mvp-blob-ingestion
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest

    env:
      AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
      AZURE_SQL_CONNECTION_STRING: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
      RAW_UPLOADS_CONTAINER: raw-uploads
      ARCHIVE_CONTAINER: archive
      ERROR_REPORTS_CONTAINER: error-reports
      EMAIL_MODE: simulation
      SEND_EMAILS: "false"
      EMAIL_DRY_RUN: "true"
      MVP_PREFIX: ${{ github.event.inputs.prefix }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ODBC Driver 18
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg unixodbc unixodbc-dev
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --batch --yes --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/ubuntu/22.04/prod jammy main" | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ingestion
        run: |
          python scripts/run_mvp_ingestion.py
